project_name: demo_codebook
text_column: text_en

codes:
  - name: explicit_position
    description: The position explicitly expressed in the text
    values:
      - supportive
      - critical
      - mixed
      - unclear

  - name: implied_position
    description: The implied or underlying position, if inferable
    values:
      - supportive
      - critical
      - mixed
      - unclear

  - name: indirectness
    description: Degree to which the response is indirect, hedged, or self-moderated
    values:
      - low
      - medium
      - high

  - name: norm_conforming_language
    description: Whether the response appears shaped by socially normative or cautious phrasing
    values:
      - yes
      - no
      - unclear

  - name: ambiguity_flag
    description: Whether the text is difficult to code confidently
    values:
      - yes
      - no

  - name: evidence_span
    description: Short text span supporting the coding
    type: string

  - name: human_review
    description: Whether manual review is recommended
    values:
      - yes
      - no